# .gitlab-ci.yml

stages:

- validate
- deploy

variables:
ANSIBLE_HOST_KEY_CHECKING: “False”
ANSIBLE_FORCE_COLOR: “true”

# Validation du playbook

validate_playbook:
stage: validate
tags:
- self-hosted
- ansible
script:
- ansible –version
- ansible-playbook –syntax-check playbook.yml
- ansible-lint playbook.yml || true
only:
- branches

# Déploiement en DEV

deploy_dev:
stage: deploy
tags:
- self-hosted
- ansible

before_script:
- ansible –version
- mkdir -p ~/.ssh
- chmod 700 ~/.ssh
- echo “$SSH_PRIVATE_KEY_DEV” | tr -d ‘\r’ > ~/.ssh/id_rsa
- chmod 600 ~/.ssh/id_rsa
- eval $(ssh-agent -s)
- ssh-add ~/.ssh/id_rsa
- echo “$ANSIBLE_INVENTORY_DEV” > inventory_dev.ini

script:
- ansible-playbook -i inventory_dev.ini playbook.yml –extra-vars “env=dev”

environment:
name: dev
url: https://dev.votre-app.com

only:
- develop
- feature/*

# Déploiement en INT (Integration)

deploy_int:
stage: deploy
tags:
- self-hosted
- ansible

before_script:
- ansible –version
- mkdir -p ~/.ssh
- chmod 700 ~/.ssh
- echo “$SSH_PRIVATE_KEY_INT” | tr -d ‘\r’ > ~/.ssh/id_rsa
- chmod 600 ~/.ssh/id_rsa
- eval $(ssh-agent -s)
- ssh-add ~/.ssh/id_rsa
- echo “$ANSIBLE_INVENTORY_INT” > inventory_int.ini

script:
- ansible-playbook -i inventory_int.ini playbook.yml –extra-vars “env=int”

environment:
name: int
url: https://int.votre-app.com

only:
- develop

when: manual

# Déploiement en PROD

deploy_prod:
stage: deploy
tags:
- self-hosted
- ansible

before_script:
- ansible –version
- mkdir -p ~/.ssh
- chmod 700 ~/.ssh
- echo “$SSH_PRIVATE_KEY_PROD” | tr -d ‘\r’ > ~/.ssh/id_rsa
- chmod 600 ~/.ssh/id_rsa
- eval $(ssh-agent -s)
- ssh-add ~/.ssh/id_rsa
- echo “$ANSIBLE_INVENTORY_PROD” > inventory_prod.ini

script:
- echo “⚠️ Déploiement en PRODUCTION ⚠️”
- ansible-playbook -i inventory_prod.ini playbook.yml –extra-vars “env=prod” –check
- echo “Dry-run réussi. Exécution du déploiement réel…”
- ansible-playbook -i inventory_prod.ini playbook.yml –extra-vars “env=prod”

environment:
name: prod
url: https://www.votre-app.com

only:
- main
- tags

when: manual

# Protection supplémentaire pour la production

rules:
- if: ‘$CI_COMMIT_BRANCH == “main”’
when: manual
- if: ‘$CI_COMMIT_TAG’
when: manual