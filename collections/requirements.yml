# collections/requirements.yml
---
collections:
  # Gestion Docker et conteneurs
  - name: community.docker
    version: ">=2.12.0,<3.0.0"

  # Gestion cloud (exemple AWS)
  - name: amazon.aws
    version: ">=6.0.0,<7.0.0"

  # Gestion systèmes Linux
  - name: ansible.posix
    version: ">=1.5.0,<2.0.0"

  # Gestion certificats SSL Let's Encrypt
  - name: community.crypto
    version: ">=2.8.0,<3.0.0"

  # Gestion Zabbix (monitoring)
  - name: community.zabbix
    version: ">=1.0.0,<2.0.0"
